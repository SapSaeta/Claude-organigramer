<!-- Panel divider -->
<line x1="596" y1="20" x2="596" y2="460" stroke="#111e34" stroke-width="1"/>

<!-- ─── LEFT PANEL — COMMITTEE NETWORK ──────────────────────────────── -->

<text x="280" y="25" text-anchor="middle"
