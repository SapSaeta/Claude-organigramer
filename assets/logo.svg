<!-- Label -->
<text x="280" y="93"  text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#1a0c00">IDEA</text>
<text x="280" y="108" text-anchor="middle" font-family="monospace" font-size="8"  fill="#5a3500">del usuario</text>

<!-- ── SPECIALIST SPHERES (blue, r=26, y=252) ── -->

