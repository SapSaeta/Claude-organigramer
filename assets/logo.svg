<text x="500" y="260" text-anchor="middle" font-family="monospace" font-size="6.5" fill="#ffd0d0">DEL DIABLO</text>

<!-- ── EVALUADOR FINAL (green, r=30, center 280,390) ── -->
<circle cx="280" cy="390" r="56" fill="#3fb950" opacity="0.04"/>
<circle cx="280" cy="390" r="46" fill="#3fb950" opacity="0.07"/>
<circle cx="280" cy="390" r="36" fill="#3fb950" opacity="0.08"/>
<circle cx="280" cy="390" r="30" fill="url(#sgreen)"/>
<circle cx="280" cy="390" r="30" fill="none" stroke="#3fb950" stroke-width="1.2" opacity="0.45"/>
<ellipse cx="269" cy="378" rx="7" ry="5" fill="white" opacity="0.18" transform="rotate(-22 269 378)"/>
