<text x="280" y="462" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#1a5530" letter-spacing="1">D · A · V · C</text>

<!-- Right-edge fade mask -->
<rect x="528" y="0" width="68" height="480" fill="url(#panelFade)"/>

<!-- ─── RIGHT PANEL — BRANDING ───────────────────────────────────────── -->

<!-- Title line 1 -->
<text x="938" y="116"
      text-anchor="middle"
      font-family="monospace" font-size="52" font-weight="bold"
      fill="url(#titleGrad)" letter-spacing="4">
  CLAUDE
</text>

<!-- Title line 2 -->
<text x="938" y="178"
      text-anchor="middle"
      font-family="monospace" font-size="52" font-weight="bold"
      fill="url(#titleGrad)" letter-spacing="4">
