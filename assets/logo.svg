<rect x="1045" y="323" width="138" height="1"  rx="1"  fill="#3fb950" opacity="0.2"/>
<text x="1114" y="341" text-anchor="middle" font-family="monospace" font-size="9.5" fill="#56d364">VALIDAR PRIMERO</text>

<!-- Separator 2 -->
