<line x1="280" y1="138" x2="390" y2="226" stroke="#1a4880" stroke-width="0.8" opacity="0.7"/>
<line x1="280" y1="138" x2="500" y2="226" stroke="#8a1010" stroke-width="0.8" opacity="0.7"/>

<!-- Agents (y=252) → Evaluador (280,390) -->
<line x1="60"  y1="278" x2="280" y2="360" stroke="#09162a" stroke-width="3"/>
<line x1="170" y1="278" x2="280" y2="360" stroke="#09162a" stroke-width="3"/>
<line x1="280" y1="278" x2="280" y2="360" stroke="#09162a" stroke-width="3"/>
<line x1="390" y1="278" x2="280" y2="360" stroke="#09162a" stroke-width="3"/>
<line x1="500" y1="278" x2="280" y2="360" stroke="#09162a" stroke-width="3"/>

<line x1="60"  y1="278" x2="280" y2="360" stroke="#165a30" stroke-width="0.8" opacity="0.7"/>
<line x1="170" y1="278" x2="280" y2="360" stroke="#165a30" stroke-width="0.8" opacity="0.7"/>
<line x1="280" y1="278" x2="280" y2="360" stroke="#1a4880" stroke-width="0.8" opacity="0.5"/>
<line x1="390" y1="278" x2="280" y2="360" stroke="#165a30" stroke-width="0.8" opacity="0.7"/>
<line x1="500" y1="278" x2="280" y2="360" stroke="#8a1010" stroke-width="0.8" opacity="0.5"/>

<!-- ── IDEA SPHERE (gold, r=40, center 280,98) ── -->
<circle cx="280" cy="98" r="72" fill="#e3b341" opacity="0.02"/>
<circle cx="280" cy="98" r="60" fill="#e3b341" opacity="0.04"/>
<circle cx="280" cy="98" r="50" fill="#e3b341" opacity="0.06"/>
<circle cx="280" cy="98" r="40" fill="url(#sgold)"/>
<circle cx="280" cy="98" r="40" fill="none" stroke="#e3b341" stroke-width="1.2" opacity="0.45"/>
