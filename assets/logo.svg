<svg width="1280" height="480" viewBox="0 0 1280 480" xmlns="http://www.w3.org/2000/svg">
<defs>

  <!-- Background radial glow -->
  <radialGradient id="bgGlow" cx="43%" cy="50%" r="58%">
    <stop offset="0%"   stop-color="#0d1f3a"/>
    <stop offset="100%" stop-color="#060a12"/>
  </radialGradient>

  <!-- Subtle grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0d1a2e" stroke-width="0.6"/>
  </pattern>

  <!-- IDEA sphere (gold) — light source top-left -->
  <radialGradient id="sgold" cx="32%" cy="26%" r="72%">
    <stop offset="0%"   stop-color="#fff4b0"/>
    <stop offset="22%"  stop-color="#f0c040"/>
    <stop offset="60%"  stop-color="#b06a00"/>
    <stop offset="100%" stop-color="#0f0800"/>
  </radialGradient>

  <!-- Specialist sphere (blue) -->
  <radialGradient id="sblue" cx="32%" cy="26%" r="72%">
    <stop offset="0%"   stop-color="#c8e4ff"/>
    <stop offset="22%"  stop-color="#58a6ff"/>
    <stop offset="60%"  stop-color="#0e3f9e"/>
    <stop offset="100%" stop-color="#00040f"/>
  </radialGradient>

  <!-- Abogado del Diablo sphere (red) -->
  <radialGradient id="sred" cx="32%" cy="26%" r="72%">
    <stop offset="0%"   stop-color="#ffd0d0"/>
    <stop offset="22%"  stop-color="#f85149"/>
    <stop offset="60%"  stop-color="#8a0e0e"/>
    <stop offset="100%" stop-color="#0f0000"/>
  </radialGradient>

  <!-- Evaluador Final sphere (green) -->
  <radialGradient id="sgreen" cx="32%" cy="26%" r="72%">
    <stop offset="0%"   stop-color="#b8ffd0"/>
    <stop offset="22%"  stop-color="#56d364"/>
    <stop offset="60%"  stop-color="#0e6e28"/>
    <stop offset="100%" stop-color="#00080a"/>
  </radialGradient>

  <!-- Title gradient: white → blue → purple -->
  <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#e6edf3"/>
    <stop offset="48%"  stop-color="#58a6ff"/>
    <stop offset="100%" stop-color="#bc8cff"/>
  </linearGradient>

  <!-- Veredicto box gradient -->
  <linearGradient id="verdictBox" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="#0c2215"/>
    <stop offset="100%" stop-color="#050c08"/>
  </linearGradient>

  <!-- Fade-out mask at right edge of left panel -->
  <linearGradient id="panelFade" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#060a12" stop-opacity="0"/>
    <stop offset="80%"  stop-color="#060a12" stop-opacity="0"/>
    <stop offset="100%" stop-color="#060a12" stop-opacity="1"/>
  </linearGradient>

  <!-- Pills -->
  <linearGradient id="pillRed"   x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#1e0808"/><stop offset="100%" stop-color="#0c0202"/>
  </linearGradient>
  <linearGradient id="pillBlue"  x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#081420"/><stop offset="100%" stop-color="#020810"/>
  </linearGradient>
  <linearGradient id="pillGold"  x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#1a1000"/><stop offset="100%" stop-color="#0a0700"/>
  </linearGradient>
  <linearGradient id="pillGreen" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#061410"/><stop offset="100%" stop-color="#020a06"/>
  </linearGradient>

</defs>

<!-- ─── BACKGROUND ──────────────────────────────────────────────────── -->
<rect width="1280" height="480" fill="#060a12"/>
<rect width="1280" height="480" fill="url(#bgGlow)"/>
<rect width="1280" height="480" fill="url(#grid)"/>

<!-- Atmospheric depth glow behind left panel -->
