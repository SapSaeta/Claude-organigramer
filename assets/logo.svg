<line x1="280" y1="420" x2="280" y2="436" stroke="#165a30" stroke-width="1.5" opacity="0.7"/>

<!-- VEREDICTO pill -->
<rect x="196" y="436" width="168" height="34" rx="17" fill="url(#verdictBox)" stroke="#3fb950" stroke-width="1.2"/>
<rect x="197" y="437" width="166" height="1"  rx="1"  fill="#3fb950" opacity="0.25"/>
