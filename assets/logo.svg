</text>
<text x="938" y="278"
      text-anchor="middle"
      font-family="monospace" font-size="13" fill="#8b949e">
  construido desde cero para cada idea concreta.
</text>
<text x="938" y="298"
      text-anchor="middle"
      font-family="monospace" font-size="12" fill="#484f58">
  No complaciente. Exige evidencia. Sin hype.
</text>

<!-- Tag pills (total 500px, center 938, start 688) -->

<!-- Pill 1: NO COMPLACIENTE (140px) -->
<rect x="688" y="322" width="140" height="30" rx="15" fill="url(#pillRed)"  stroke="#da3633" stroke-width="1"/>
<rect x="689" y="323" width="138" height="1"  rx="1"  fill="#da3633" opacity="0.2"/>
<text x="758" y="341" text-anchor="middle" font-family="monospace" font-size="9.5" fill="#f85149">NO COMPLACIENTE</text>

<!-- Pill 2: DINAMICO (90px) -->
